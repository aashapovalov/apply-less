services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: applyless-postgres
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: applyless

    volumes:
      # Persistent database data
      - postgres_data:/var/lib/postgresql/data


    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d applyless"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
