services:
  # ── Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: applyless-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 128m
    networks:
      - applyless

  # ── Node.js API (Express) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: applyless-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ML_SERVICE_URL: http://ml:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - applyless

  # ── Python ML Service (FastAPI) ───────────────────
  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: applyless-ml
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 8000
      TRANSFORMERS_CACHE: /app/models
      HF_HOME: /app/models
    volumes:
      - ml_models:/app/models
    mem_limit: 2560m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - applyless

  # ── PostgreSQL + pgvector ─────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: applyless-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /var/run/postgresql:rw,noexec,nosuid,size=1m
    mem_limit: 512m
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - applyless

volumes:
  postgres_data:
  ml_models:

networks:
  applyless:
    driver: bridge
